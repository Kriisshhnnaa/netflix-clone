<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="signin.css">
    <link rel="icon" href="images/netflix-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>

    <div class="box">

        <div class="header">
            <img src="images/netflix-logo-signin.png" height="50px">
        </div>  

        <div class="content">
            <h2 style="font-size: 2rem;">Sign In</h2>
            <input type="email" placeholder="Enter demo email" class="email-btn">
            <input type="password" placeholder="Enter demo password" class="email-btn" >
            <a href="home.html"><button class="red-btn">Demo Login</button></a>
            <p style="text-align: center; color: #cccccc;">OR</p>
            <button class="transparent-btn">Use a sign-in code</button>
            <a href="#" class="forgot-link">Forgot password?</a>
            <span>
                <input type="checkbox" id="checkbox" checked>
                <label for="checkbox">Remember me</label>
            </span>
            <p style="color: #cccccc;">New to Netflix? <a href="#" id="sign-up-link">Sign up now.</a></p>
            <p style="font-size: 0.9rem; color: #cccccc;">This page is protected by Google reCAPTCHA to ensure you're not a bot. <a href="#" style="text-decoration: none;">Learn more.</a></p>
        </div>
    </div>
    <div class="footer">
        <p style="color: #cccccc; font-size: 1.05rem;">Questions? Call <a href="#" id="number">000-800-919-1743</a></p>
        <div class="footer-cols">
            <div class="section">
                <a href="#">FAQ</a>
                <a href="#">Cookie Preferences</a>
            </div>
            <div class="section">
                <a href="#">Help Centre</a>
                <a href="#">Corporate Information</a>
            </div>
            <div class="section">
                <a href="#">Term of Use</a>
            </div>
            <div class="section">
                <a href="#">Privacy</a>
            </div>
        </div>
        <select class="dropdown">
            <option>English</option>
            <option>Hindi</option>
        </select>
    </div> 
</body>
</html>
